name: Refresh Artifact Dataset

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: refresh-artifact-dataset-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: blacksmith-16vcpu-ubuntu-2204
    env:
      CHECKOUT_REPOSITORY: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
      CHECKOUT_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}
      PUSH_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}
      CACHE_DELETE_REF: ${{ github.event_name == 'pull_request' && format('refs/pull/{0}/merge', github.event.pull_request.number) || format('refs/heads/{0}', github.ref_name) }}
      WARM_CCACHE_ONLY: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 2G
      CCACHE_RUN_START_MARKER: ${{ github.workspace }}/.ccache-run-start

    steps:
      - name: Check out target branch
        uses: actions/checkout@v5
        with:
          repository: ${{ env.CHECKOUT_REPOSITORY }}
          ref: ${{ env.CHECKOUT_REF }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build ccache

      - name: Restore ccache objects
        id: ccache-restore
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ github.run_id }}
          restore-keys: |
            ccache

      - name: Reset ccache statistics
        run: |
          ccache -s
          ccache -z

      - name: Mark ccache run start
        run: touch "${CCACHE_RUN_START_MARKER}"

      - name: Install maintainer dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Refresh tracked artifacts
        run: |
          rm -rf artifacts/onnxruntime
          mkdir -p artifacts
          python tools/scripts/extract_test_artifacts.py --artifacts-output artifacts --rebuild

      - name: Refresh validation expectations
        if: env.WARM_CCACHE_ONLY != 'true'
        run: python tools/scripts/update_artifact_validation_expectations.py

      - name: Refresh validation report
        if: env.WARM_CCACHE_ONLY != 'true'
        run: |
          python tools/scripts/generate_artifact_validation_overview.py
          python tools/scripts/generate_operator_markdown.py

      - name: Run pytest
        if: env.WARM_CCACHE_ONLY != 'true'
        run: pytest -q

      - name: Commit and push generated dataset updates
        if: env.WARM_CCACHE_ONLY != 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A artifacts tests/artifact_validation_expected.json
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh ORT artifact dataset"
          git push origin HEAD:${PUSH_REF}

      - name: Skip auto-push for fork pull requests
        if: env.WARM_CCACHE_ONLY != 'true' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        run: echo "Skipping commit and push because this pull request comes from a fork."

      - name: Prune ccache entries not used in this run
        if: success()
        run: |
          for cache_bucket in "${CCACHE_DIR}"/[0-9a-f]; do
            if [ -d "${cache_bucket}" ]; then
              find "${cache_bucket}" -type f ! -newer "${CCACHE_RUN_START_MARKER}" -delete
            fi
          done
          ccache -c
          ccache -s

      - name: Save ccache objects
        if: success()
        uses: actions/cache/save@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ github.run_id }}
